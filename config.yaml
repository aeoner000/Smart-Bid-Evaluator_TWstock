
# Global configuration for Smart-Bid-Evaluator_TWstock
# This file is intended to replace hard-coded *_cfg.py constants.

# -------------------------------------------------------------------
#  Storage Configuration: "local" or "gcs"
# -------------------------------------------------------------------
storage:
  type: "gcs"
  gcs:
    bucket_name: "bid-predict-gcs-bucket"
    credentials_path: "json/gcp-auth.json"

# -------------------------------------------------------------------
#  Database Configuration: "sqlite" or "bigquery"
# -------------------------------------------------------------------
database:
  type: "bigquery"  # Switch between "sqlite" and "bigquery"
  
  sqlite:
    # SQLite database location (relative to repo root)
    db_path: "data/database/database.sqlite3"
    test_db_path: "data/database/test_database.sqlite3"  # test database
    # Optional SQLite connect options
    connect:
      timeout: 30
      check_same_thread: false

  bigquery:
    project_id: "gen-lang-client-0590877921"
    dataset_id: "bid_predict_table"
    credentials_path: "json/gcp-auth.json"

paths:
  skew_path: "src/models/saved_weights/skew_transformer.joblib"
  weights_dir: "src/models/saved_weights"
  metadata_path: "json/training_metadata.json"
  
common:
  # Encoding for CSVs written by the project
  csv_encoding: "utf-8-sig"
  # Default User-Agent for web requests
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

ml_model_environment:
  # 基礎環境配置
  global_settings:
    random_state: 42
    test_size: 0.2

  # 機器學習模型超參數搜尋空間配置
  models:
    # LightGBM: 適合處理大規模特徵，需嚴格限制葉子數以防小樣本過擬合
    lgbm:
      static_params:
        objective: "regression"
        metric: "rmse"
        n_estimators: 300          # 增加總樹量上限，給予充分學習空間
        verbosity: -1
        random_state: 42
      search_space:
        learning_rate: { type: "float", low: 0.01, high: 0.05 } # 慢速學習，確保收斂平穩
        num_leaves: { type: "int", low: 7, high: 15 }          # 限制複雜度，小樣本數據嚴禁多葉片
        min_child_samples: { type: "int", low: 10, high: 30 }  # 提高節點門檻，增加模型保守度
        reg_alpha: { type: "float", low: 1.0, high: 10.0 }     # L1 正則：強制縮減係數，解決強特徵排擠
        reg_lambda: { type: "float", low: 1.0, high: 10.0 }    # L2 正則：限制權重大小，防止預測值噴發
        feature_fraction: { type: "float", low: 0.6, high: 0.8 } # 特徵抽樣：強迫模型挖掘弱特徵規律
        bagging_fraction: { type: "float", low: 0.5, high: 0.8 } # 樣本抽樣：增加模型對異常值的抵抗力

    # XGBoost: 透過限制樹深與隨機採樣增加魯棒性
    xgb:
      static_params:
        objective: "reg:squarederror"
        eval_metric: "rmse"
        n_estimators: 300          # 長線迭代，配合早停機制
        random_state: 42
        verbosity: 0
      search_space:
        learning_rate: { type: "float", low: 0.01, high: 0.05 } # 穩定步長，避免跳過全局最優解
        max_depth: { type: "int", low: 3, high: 5 }            # 限制深度，金融數據 3~5 層最穩
        subsample: { type: "float", low: 0.5, high: 0.8 }       # 樣本隨機性，防止過度依賴特定標案
        colsample_bytree: { type: "float", low: 0.6, high: 0.8 } # 特徵隨機性，杜絕單一強特徵霸凌
        gamma: { type: "float", low: 0.1, high: 5.0 }          # 分裂懲罰，值越高模型越不容易亂分裂

    # CatBoost: 專注於 L2 正則化，天生抗過擬合能力強
    cat:
      static_params:
        loss_function: "RMSE"
        iterations: 500            # 給予充足的優化回合
        logging_level: 'Silent'     # 加上這行，保持輸出乾淨
        random_seed: 42
        allow_writing_files: False
      search_space:
        depth: { type: "int", low: 3, high: 5 }              # 淺層策略，過濾市場噪音
        learning_rate: { type: "float", low: 0.01, high: 0.05 } # 確保模型在複雜面上緩慢下降
        l2_leaf_reg: { type: "float", low: 1.0, high: 15.0 } # 強力 L2 懲罰，讓預測結果更平滑
        rsm: { type: "float", low: 0.6, high: 0.8 }          # 每層分裂隨機特徵比，分散預測風險
  # 目標清單
  targets:
    stock_return:
      model_list: ["lgbm", "xgb", "cat"]

